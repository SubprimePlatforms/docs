    AsyncJobResponse:
      oneOf:
        - $ref: "#/components/schemas/AsyncJobPending"
        - $ref: "#/components/schemas/AsyncJobProcessing"
        - $ref: "#/components/schemas/AsyncJobReady"
        - $ref: "#/components/schemas/AsyncJobFailed"
      discriminator:
        propertyName: status
        mapping:
          pending: "#/components/schemas/AsyncJobPending"
          processing: "#/components/schemas/AsyncJobProcessing"
          ready: "#/components/schemas/AsyncJobReady"
          failed: "#/components/schemas/AsyncJobFailed"
      description: "Async job status. Discriminated on `status`: pending, processing,
        ready (includes result), or failed (includes error)."
    AsyncJobPending:
      type: object
      properties:
        jobId:
          type: string
        createdAt:
          type: number
        updatedAt:
          type: string
        status:
          type: string
          enum:
            - pending
      required:
        - jobId
        - createdAt
        - updatedAt
        - status
    AsyncJobProcessing:
      type: object
      properties:
        jobId:
          type: string
        createdAt:
          type: number
        updatedAt:
          type: string
        status:
          type: string
          enum:
            - processing
      required:
        - jobId
        - createdAt
        - updatedAt
        - status
    AsyncJobReady:
      type: object
      properties:
        jobId:
          type: string
        createdAt:
          type: number
        updatedAt:
          type: string
        status:
          type: string
          enum:
            - ready
        result: {}
      required:
        - jobId
        - createdAt
        - updatedAt
        - status
    AsyncJobFailed:
      type: object
      properties:
        jobId:
          type: string
        createdAt:
          type: number
        updatedAt:
          type: string
        status:
          type: string
          enum:
            - failed
        error:
          type: string
      required:
        - jobId
        - createdAt
        - updatedAt
        - status
        - error
    PresignUrlResponse:
      type: object
      properties:
        uploads:
          type: array
          items:
            $ref: "#/components/schemas/PresignUrlEntry"
      required:
        - uploads
    PresignUrlEntry:
      type: object
      properties:
        uploadUrl:
          type: string
          description: S3 presigned PUT URL. Send the file as the request body.
        fileKey:
          type: string
          description: S3 object key that the file will live under once uploaded. Pass
            this key to downstream endpoints (e.g. /v1/document/scan) in place
            of the binary payload.
      required:
        - uploadUrl
        - fileKey
    PresignUrlRequest:
      type: object
      properties:
        files:
          type: array
          items:
            $ref: "#/components/schemas/PresignUrlFile"
          minItems: 1
          description: One entry per file the caller intends to upload. The array length
            determines how many presigned URLs are returned, in matching order.
      required:
        - files
    PresignUrlFile:
      type: object
      properties:
        contentType:
          type: string
          minLength: 1
          example: image/jpeg
          description: MIME type of the file. The presigned URL is bound to this content
            type — the PUT must send the same `Content-Type` header or S3
            returns 403.
        byteLength:
          type: integer
          exclusiveMinimum: 0
          maximum: 15728640
          example: 263582
          description: Size of the file in bytes. Signed into the URL via `Content-Length`
            so the PUT must send exactly this many bytes. Maximum 15728640 bytes
            (15 MiB).
      required:
        - contentType
        - byteLength
  parameters: {}
paths:
  /v1/document/scan:
    post:
      tags:
        - Document
      summary: Scan an identity document
      description: Extracts structured identity data (name, date of birth, document
        number, etc.) from a single document image via AWS Textract AnalyzeID.
        Accepts the image as a multipart upload, a base64/base64url-encoded JSON
        string, or an S3 object key from a previously presigned upload.
      security: &a2
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScanDocumentJsonRequest"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/ScanDocumentMultipartRequest"
      responses:
        "200":
          description: Successful scan.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanDocumentResponse"
        "400":
          description: The request body failed schema validation or contained an
            unsupported image format.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: API key is invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: API key is missing, or the referenced resource does not belong to
            this organization.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Referenced resource was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Unexpected server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/face/detect:
    post:
      tags:
        - Face
      summary: Detect a face in an image
      description: "Returns the highest-confidence detected face with its bounding box
        and facial landmarks. When no face is detected, returns `faceDetected:
        false` with `confidence: 0`."
      security: *a2
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DetectFaceJsonRequest"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/DetectFaceMultipartRequest"
      responses:
        "200":
          description: Detection result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetectFaceResponse"
        "400":
          description: The request body failed schema validation or contained an
            unsupported image format.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: API key is invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: API key is missing, or the referenced resource does not belong to
            this organization.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Referenced resource was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Unexpected server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/face/compare:
    post:
      tags:
        - Face
      summary: Compare a source face image to a target face image
      description: Returns the similarity between two face images. `isMatch` is true
        when similarity meets the server-side threshold.
      security: *a2
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompareFacesJsonRequest"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CompareFacesMultipartRequest"
      responses:
        "200":
          description: Comparison result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompareFacesResponse"
        "400":
          description: The request body failed schema validation or contained an
            unsupported image format.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: API key is invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: API key is missing, or the referenced resource does not belong to
            this organization.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Referenced resource was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Unexpected server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/face/estimate-age:
    post:
      tags:
        - Face
      summary: Estimate age and gender from a face image
      description: Returns an estimated age, age range, and gender for the
        highest-confidence detected face in the image.
      security: *a2
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DetectFaceJsonRequest"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/DetectFaceMultipartRequest"
      responses:
        "200":
          description: Age and gender estimate.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EstimateAgeResponse"
        "400":
          description: The request body failed schema validation or contained an
            unsupported image format.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: API key is invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: API key is missing, or the referenced resource does not belong to
            this organization.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Referenced resource was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Unexpected server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/identity/verify:
    post:
      tags:
        - Identity
      summary: Verify identity from a document image and a selfie
      description: Runs document scan, face detection on the selfie, and face
        comparison between the document portrait and the selfie in a single
        server call. Returns the combined result plus a weighted overall
        confidence score.
      security: *a2
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IdentityVerifyJsonRequest"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/IdentityVerifyMultipartRequest"
      responses:
        "200":
          description: Combined verification result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentityVerifyResponse"
        "400":
          description: The request body failed schema validation or contained an
            unsupported image format.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: API key is invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: API key is missing, or the referenced resource does not belong to
            this organization.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Referenced resource was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Unexpected server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/sessions:
    post:
      tags:
        - Sessions
      summary: Create and send a verification session
      description: Creates an IDV session for an applicant and (by default) sends an
        email and SMS invite with the verification link. Pass a `workflowId` to
        run a custom workflow; omit it for legacy IDV.
