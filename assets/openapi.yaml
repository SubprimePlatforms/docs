openapi: 3.1.0
info:
  title: deepidv Public API
  version: 0.1.0
  description: Server-to-server endpoints for the deepidv identity verification
    platform. Authenticate with a per-organization API key via the `x-api-key`
    header.
servers:
  - url: https://api.deepidv.com
    description: Production
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
      description: Per-organization API key. Issued via the deepidv dashboard. Send on
        every request.
  schemas:
    AdverseMediaResponse:
      type: object
      properties:
        totalHits:
          type: integer
        riskLevel:
          type: string
          enum:
            - LOW
            - MEDIUM
            - HIGH
            - CRITICAL
        riskScore:
          type: integer
          minimum: 0
          maximum: 100
        summary:
          type: string
        findings:
          type: array
          items:
            type: object
            properties:
              findingId:
                type: string
              severity:
                type: string
                enum:
                  - MEDIUM
                  - HIGH
                  - CRITICAL
              category:
                type: string
              title:
                type: string
              detail:
                type: string
              sourceUrl:
                type:
                  - string
                  - "null"
              sourceName:
                type:
                  - string
                  - "null"
              articleDate:
                type:
                  - string
                  - "null"
              confidence:
                type: number
                minimum: 0
                maximum: 1
              confirmedBy:
                type: array
                items:
                  type: string
            required:
              - findingId
              - severity
              - category
              - title
              - detail
              - sourceUrl
              - sourceName
              - articleDate
              - confidence
              - confirmedBy
        exposuresByCategory:
          type: object
          properties:
            financial_crime: &a1
              type: object
              properties:
                hits:
                  type: integer
                articles:
                  type: array
                  items:
                    type: object
                    properties:
                      timestamp:
                        type:
                          - string
                          - "null"
                      headline:
                        type: string
                      sourceLink:
                        type:
                          - string
                          - "null"
                      source:
                        type: string
                        enum:
                          - news
                          - court-records
                          - watchlist-database
                    required:
                      - timestamp
                      - headline
                      - sourceLink
                      - source
              required:
                - hits
                - articles
            terrorism: *a1
            regulatory: *a1
            political: *a1
            organized_crime: *a1
            violent_crime: *a1
            criminal_legal: *a1
            reputational: *a1
            court_records: *a1
      required:
        - totalHits
        - riskLevel
        - riskScore
        - summary
        - findings
        - exposuresByCategory
      description: Result of an adverse media screening including risk score,
        findings, and exposure breakdown by category.
    TitleCheckResponse:
      oneOf:
        - type: object
          properties:
            status:
              type: string
              enum:
                - found
            subjectProperty:
              type:
                - object
                - "null"
              properties:
                APNFormatted:
                  type:
                    - string
                    - "null"
                APNUnformatted:
                  type:
                    - string
                    - "null"
                PropertyFullStreetAddress:
                  type:
                    - string
                    - "null"
                PropertyCity:
                  type:
                    - string
                    - "null"
                PropertyState:
                  type:
                    - string
                    - "null"
                PropertyZipCode:
                  type:
                    - string
                    - "null"
                PropertyCounty:
                  type:
                    - string
                    - "null"
                LegalDescription:
                  type:
                    - string
                    - "null"
                PropertyType:
                  type:
                    - string
                    - "null"
                LandUseCode:
                  type:
                    - string
                    - "null"
                LandUseDescription:
                  type:
                    - string
                    - "null"
                Zoning:
                  type:
                    - string
                    - "null"
                LotSizeAcres:
                  type:
                    - number
                    - "null"
                LotSizeSqFt:
                  type:
                    - number
                    - "null"
                YearBuilt:
                  type:
                    - integer
                    - "null"
                Bedrooms:
                  type:
                    - integer
                    - "null"
                Bathrooms:
                  type:
                    - number
                    - "null"
                BuildingAreaSqFt:
                  type:
                    - number
                    - "null"
                Stories:
                  type:
                    - number
                    - "null"
              required:
                - APNFormatted
                - APNUnformatted
                - PropertyFullStreetAddress
                - PropertyCity
                - PropertyState
                - PropertyZipCode
                - PropertyCounty
                - LegalDescription
                - PropertyType
                - LandUseCode
                - LandUseDescription
                - Zoning
                - LotSizeAcres
                - LotSizeSqFt
                - YearBuilt
                - Bedrooms
                - Bathrooms
                - BuildingAreaSqFt
                - Stories
            ownerInformation:
              type:
                - object
                - "null"
              properties:
                Owner1LastName:
                  type:
                    - string
                    - "null"
                Owner1FirstNameMiddleInitial:
                  type:
                    - string
                    - "null"
                Owner2LastName:
                  type:
                    - string
                    - "null"
                Owner2FirstNameMiddleInitial:
                  type:
                    - string
                    - "null"
                MailingFullStreetAddress:
                  type:
                    - string
                    - "null"
                MailingCity:
                  type:
                    - string
                    - "null"
                MailingState:
                  type:
                    - string
                    - "null"
                MailingZipCode:
                  type:
                    - string
                    - "null"
                VestingOwnershipRights:
                  type:
                    - string
                    - "null"
                OwnerOccupied:
                  type:
                    - string
                    - "null"
              required:
                - Owner1LastName
                - Owner1FirstNameMiddleInitial
                - Owner2LastName
                - Owner2FirstNameMiddleInitial
                - MailingFullStreetAddress
                - MailingCity
                - MailingState
                - MailingZipCode
                - VestingOwnershipRights
                - OwnerOccupied
            locationInformation:
              type:
                - object
                - "null"
              properties:
                County:
                  type:
                    - string
                    - "null"
                CensusTract:
                  type:
                    - string
                    - "null"
                CensusBlock:
                  type:
                    - string
                    - "null"
                Municipality:
                  type:
                    - string
                    - "null"
                SchoolDistrict:
                  type:
                    - string
                    - "null"
                FloodZone:
                  type:
                    - string
                    - "null"
                FloodPanelNumber:
                  type:
                    - string
                    - "null"
                Neighborhood:
                  type:
                    - string
                    - "null"
              required:
                - County
                - CensusTract
                - CensusBlock
                - Municipality
                - SchoolDistrict
                - FloodZone
                - FloodPanelNumber
                - Neighborhood
            ownerTransferInformation:
              type:
                - object
                - "null"
              properties:
                TransferDocumentNumber:
                  type:
                    - string
                    - "null"
                TransferRecordingDate:
                  type:
                    - string
                    - "null"
                TransferSaleDate:
                  type:
                    - string
                    - "null"
                TransferDeedType:
                  type:
                    - string
                    - "null"
                TransferSalePrice:
                  type:
                    - number
                    - "null"
              required:
                - TransferDocumentNumber
                - TransferRecordingDate
                - TransferSaleDate
                - TransferDeedType
                - TransferSalePrice
            lastMarketSaleInformation:
              type:
                - object
                - "null"
              properties:
                SaleDate:
                  type:
                    - string
                    - "null"
                SalePrice:
                  type:
                    - number
                    - "null"
                SaleDocumentNumber:
                  type:
                    - string
                    - "null"
                SaleDeedType:
                  type:
                    - string
                    - "null"
                RecordingDate:
                  type:
                    - string
                    - "null"
                Buyer:
                  type:
                    - string
                    - "null"
                Seller:
                  type:
                    - string
                    - "null"
                PricePerSqFt:
                  type:
                    - number
                    - "null"
              required:
                - SaleDate
                - SalePrice
                - SaleDocumentNumber
                - SaleDeedType
                - RecordingDate
                - Buyer
                - Seller
                - PricePerSqFt
          required:
            - status
            - subjectProperty
            - ownerInformation
            - locationInformation
            - ownerTransferInformation
            - lastMarketSaleInformation
        - type: object
          properties:
            status:
              type: string
              enum:
                - multiple_properties
            message:
              type: string
            availableUnits:
              type: array
              items:
                type: string
            properties:
              type: array
              items:
                type: object
                properties:
                  owner:
                    type: string
                  apartmentOrUnit:
                    type: string
                required:
                  - owner
                  - apartmentOrUnit
          required:
            - status
            - message
            - availableUnits
            - properties
        - type: object
          properties:
            status:
              type: string
              enum:
                - unsupported_region
            message:
              type: string
              enum:
                - Title search is currently available for US addresses only.
          required:
            - status
            - message
        - type: object
          properties:
            status:
              type: string
              enum:
                - not_found
            message:
              type: string
          required:
            - status
            - message
      description: "Result of a title/property search. Discriminated on `status`:
        found, multiple_properties, unsupported_region, or not_found."
    ScanDocumentResponse:
      type: object
      properties:
        documentType:
          type: string
        fullName:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        dateOfBirth:
          type: string
        gender:
          type: string
        nationality:
          type: string
        documentNumber:
          type: string
        expirationDate:
          type: string
        issuingCountry:
          type: string
        address:
          type: string
        mrzData:
          type: string
        rawFields:
          type: object
          additionalProperties:
            type: string
        confidence:
          type: number
          minimum: 0
          maximum: 1
          description: Average extraction confidence across all detected fields, 0–1.
      required:
        - documentType
        - fullName
        - firstName
        - lastName
        - dateOfBirth
        - gender
        - nationality
        - documentNumber
        - expirationDate
        - issuingCountry
        - rawFields
        - confidence
      description: Structured identity data extracted from a document image via AWS
        Textract AnalyzeID.
    ErrorResponse:
      anyOf:
        - $ref: "#/components/schemas/SimpleErrorResponse"
        - $ref: "#/components/schemas/ValidationErrorResponse"
      description: "Shared error envelope returned by all server-to-server endpoints.
        The shape depends on the failure mode: validation failures include
        `message` + `hints`; all other failures return a single `error` string."
    SimpleErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
      description: Error returned for authentication failures, image format errors,
        and other terminal failures with a single human-readable message.
    ValidationErrorResponse:
      type: object
      properties:
        message:
          type: string
        hints:
          type: array
          items: {}
      required:
        - message
        - hints
      description: Error returned when the request body fails schema validation.
        `hints` contains the underlying Zod issues.
    ScanDocumentJsonRequest:
      type: object
      properties:
        image:
          $ref: "#/components/schemas/ImageAssetJson"
        documentType:
          $ref: "#/components/schemas/DocumentType"
      required:
        - image
    ImageAssetJson:
      type: string
      minLength: 1
      description: An image payload sent as a JSON string. Accepts a base64 string,
        base64url string, or an S3 object key for a file previously uploaded via
        the presigned-upload flow.
      example: iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNk+A8AAQUBAScY42YAAAAASUVORK5CYII=
    DocumentType:
      type: string
      enum:
        - passport
        - drivers_license
        - national_id
        - auto
      description: Type of identity document. Use 'auto' to let the server infer the
        type from the document image.
      example: auto
    ScanDocumentMultipartRequest:
      type: object
      properties:
        image:
          $ref: "#/components/schemas/ImageAssetMultipart"
        documentType:
          $ref: "#/components/schemas/DocumentType"
      required:
        - image
    ImageAssetMultipart:
      type: string
      format: binary
      description: Binary image file uploaded as part of a multipart/form-data request.
    DetectFaceResponse:
      type: object
      properties:
        faceDetected:
          type: boolean
        confidence:
          type: number
          minimum: 0
          maximum: 1
          description: Detection confidence for the top face, 0–1.
        boundingBox:
          $ref: "#/components/schemas/BoundingBox"
        landmarks:
          type: array
          items:
            $ref: "#/components/schemas/Landmark"
      required:
        - faceDetected
        - confidence
      description: Result of face detection on a single image. When `faceDetected` is
        false, `confidence` is 0 and `boundingBox`/`landmarks` are omitted.
    BoundingBox:
      type: object
      properties:
        top:
          type: number
        left:
          type: number
        width:
          type: number
        height:
          type: number
      required:
        - top
        - left
        - width
        - height
      description: Normalized bounding-box coordinates (0–1) relative to the source
        image dimensions.
    Landmark:
      type: object
      properties:
        type:
          type: string
        x:
          type: number
        y:
          type: number
      required:
        - type
        - x
        - y
      description: A facial landmark point. Coordinates are normalized to the image
        dimensions.
    DetectFaceJsonRequest:
      type: object
      properties:
        image:
          $ref: "#/components/schemas/ImageAssetJson"
      required:
        - image
    DetectFaceMultipartRequest:
      type: object
      properties:
        image:
          $ref: "#/components/schemas/ImageAssetMultipart"
      required:
        - image
    CompareFacesResponse:
      type: object
      properties:
        isMatch:
          type: boolean
          description: True when `confidence` >= `threshold`.
        confidence:
          type: number
          description: "Raw similarity score from AWS Rekognition (0–100). Note: not
            normalized to 0–1."
        threshold:
          type: number
          description: Server-side similarity threshold used for `isMatch` (0–100).
        sourceFaceDetected:
          type: boolean
        targetFaceDetected:
          type: boolean
      required:
        - isMatch
        - confidence
        - threshold
        - sourceFaceDetected
        - targetFaceDetected
      description: Result of comparing a source and target face image. Returned with
        all fields set to false / 0 when either image contains no detectable
        face.
    CompareFacesJsonRequest:
      type: object
      properties:
        source:
          $ref: "#/components/schemas/ImageAssetJson"
        target:
          $ref: "#/components/schemas/ImageAssetJson"
      required:
        - source
        - target
    CompareFacesMultipartRequest:
      type: object
      properties:
        source:
          $ref: "#/components/schemas/ImageAssetMultipart"
        target:
          $ref: "#/components/schemas/ImageAssetMultipart"
      required:
        - source
        - target
    EstimateAgeResponse:
      type: object
      properties:
        faceDetected:
          type: boolean
        estimatedAge:
          type: integer
        ageRange:
          type: object
          properties:
            low:
              type: integer
            high:
              type: integer
          required:
            - low
            - high
        gender:
          type: string
          enum:
            - male
            - female
        genderConfidence:
          type: number
          minimum: 0
          maximum: 1
      required:
        - faceDetected
      description: Age and gender estimate for the most confident detected face. When
        `faceDetected` is false, only that field is present.
    IdentityVerifyResponse:
      type: object
      properties:
        verified:
          type: boolean
        document:
          $ref: "#/components/schemas/IdentityVerifyDocument"
        faceDetection:
          $ref: "#/components/schemas/IdentityVerifyFaceDetection"
        faceMatch:
          $ref: "#/components/schemas/IdentityVerifyFaceMatch"
        overallConfidence:
          type: number
          minimum: 0
          maximum: 100
          description: Weighted aggregate confidence across document extraction, face
            detection, and face match (0–100).
      required:
        - verified
        - document
        - faceDetection
        - faceMatch
        - overallConfidence
      description: Combined result of document scan, face detection, and face
        comparison run in one server call.
    IdentityVerifyDocument:
      type: object
      properties:
        documentType:
          type: string
        fullName:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        dateOfBirth:
          type: string
        gender:
          type: string
        nationality:
          type: string
        documentNumber:
          type: string
        expirationDate:
          type: string
        issuingCountry:
          type: string
        address:
          type: string
        confidence:
          type: number
          minimum: 0
          maximum: 100
          description: Average document-extraction confidence, 0–100.
      required:
        - documentType
        - fullName
        - firstName
        - lastName
        - dateOfBirth
        - gender
        - nationality
        - documentNumber
        - expirationDate
        - issuingCountry
        - confidence
      description: Subset of the document-scan response embedded in the verify result.
    IdentityVerifyFaceDetection:
      type: object
      properties:
        faceDetected:
          type: boolean
        confidence:
          type: number
          minimum: 0
          maximum: 100
          description: Detection confidence for the top face, 0–100.
      required:
        - faceDetected
        - confidence
    IdentityVerifyFaceMatch:
      type: object
      properties:
        isMatch:
          type: boolean
        confidence:
          type: number
          minimum: 0
          maximum: 100
          description: Best face-match similarity, 0–100.
        threshold:
          type: number
          minimum: 0
          maximum: 100
          description: Match threshold, 0–100.
      required:
        - isMatch
        - confidence
        - threshold
    IdentityVerifyJsonRequest:
      type: object
      properties:
        documentImage:
          $ref: "#/components/schemas/ImageAssetJson"
        faceImage:
          $ref: "#/components/schemas/ImageAssetJson"
        documentType:
          $ref: "#/components/schemas/DocumentType"
      required:
        - documentImage
        - faceImage
    IdentityVerifyMultipartRequest:
      type: object
      properties:
        documentImage:
          $ref: "#/components/schemas/ImageAssetMultipart"
        faceImage:
          $ref: "#/components/schemas/ImageAssetMultipart"
        documentType:
          $ref: "#/components/schemas/DocumentType"
      required:
        - documentImage
        - faceImage
    CreateSessionResponse:
      type: object
      properties:
        id:
          type: string
        session_url:
          type: string
        externalId:
          type: string
        expires_at:
          type: string
        links:
          type: array
          items:
            $ref: "#/components/schemas/Link"
      required:
        - id
        - session_url
        - links
      description: Returned after creating a session. `session_url` is the
        applicant-facing verification link.
    Link:
      type: object
      properties:
        rel:
          type: string
        href:
          type: string
        description:
          type: string
      required:
        - rel
        - href
      description: HATEOAS-style link to a related resource.
    CreateSessionRequest:
      type: object
      properties:
        email:
          type: string
          example: applicant@example.com
        firstName:
          type: string
          example: Jane
        lastName:
          type: string
          example: Doe
        phone:
          type: string
          pattern: ^\+[1-9]\d{9,14}$
          example: "+15192223333"
          description: Phone number in E.164 format.
        externalId:
          type: string
          description: Caller-supplied identifier echoed back on responses and queryable
            via the list endpoint.
        sendEmailInvite:
          type: boolean
          description: Send the email invite. Defaults to true.
        sendPhoneInvite:
          type: boolean
          description: Send the SMS invite. Defaults to true.
        workflowId:
          type: string
          description: Workflow to run for this session. Without a workflowId the session
            is a legacy IDV verification.
        redirectUrl:
          type: string
          format: uri
          example: https://example.com/post-verify
          description: Must use HTTPS. Applicant is sent here after completion.
        expiresInHours:
          type: integer
          minimum: 1
          maximum: 8760
          description: Auto-expire the session after this many hours. Range 1–8760 (1
            year). Overrides any workflow-level expiry.
      required:
        - email
        - firstName
        - lastName
        - phone
      description: Body for creating an IDV/verification session. Snake_case keys are
        also accepted.
    ListSessionsResponse:
      type: object
      properties:
        sessions:
          type: array
          items:
            $ref: "#/components/schemas/SessionRecord"
        next_token:
          type:
            - string
            - "null"
      required:
        - sessions
        - next_token
    SessionRecord:
      type: object
      properties:
        id:
          type: string
        organization_id:
          type: string
        user_id:
          type: string
        sender_user_id:
          type: string
        created_at:
          type: string
        updated_at:
          type: string
        status:
          type: string
          description: One of PENDING, VERIFIED, REJECTED, EXPIRED.
        type:
          type: string
        session_progress:
          type: string
        external_id:
          type: string
        permalink_id:
          type: string
        location:
          type:
            - string
            - "null"
        submitted_at:
          type: string
        deep_sign_id:
          type: string
        face_liveness_session_id:
          type: string
        workflow_id:
          type: string
        bank_statement_request_id:
          type: string
        redirect_url:
          type: string
        expires_at:
          type: string
        workflow_steps:
          type: array
          items:
            type: string
        meta_data:
          type: object
          additionalProperties: {}
        uploads:
          type: object
          additionalProperties:
            type: boolean
          description: Map of upload slot → whether the applicant has uploaded that file.
            Keys are session-shape specific (e.g. id_front, selfie).
        analysis_data:
          type: object
          additionalProperties: {}
          description: Free-form analysis output. Shape depends on the workflow steps run.
      required:
        - id
        - organization_id
        - user_id
        - sender_user_id
        - created_at
        - updated_at
        - status
        - type
        - session_progress
      description: Server-side representation of a session.
    GetSessionResponse:
      type: object
      properties:
        session_record:
          $ref: "#/components/schemas/SessionRecord"
        resource_links:
          type: object
          additionalProperties:
            type: string
          description: Map of upload slot → S3 presigned GET URL for the
            applicant-uploaded asset. URLs expire on a fixed window.
        user:
          type: object
          additionalProperties: {}
        sender_user:
          type: object
          additionalProperties: {}
      required:
        - session_record
        - resource_links
    UpdateSessionStatusResponse:
      type: object
      properties:
        session_record:
          $ref: "#/components/schemas/SessionRecord"
      required:
        - session_record
    UpdateSessionStatusBody:
      type: object
      properties:
        new_status:
          type: string
          enum:
            - VERIFIED
            - REJECTED
      required:
        - new_status
    ListWorkflowsResponse:
      type: object
      properties:
        workflows:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowSummary"
      required:
        - workflows
    WorkflowSummary:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
        steps:
          type: array
          items:
            type: string
          description: Step ids in API form (UPPER_SNAKE).
        created_at:
          type: string
      required:
        - id
        - name
        - status
        - steps
        - created_at
    GetWorkflowResponse:
      type: object
      properties:
        workflow:
          $ref: "#/components/schemas/Workflow"
      required:
        - workflow
    Workflow:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
        organization_id:
          type: string
        created_at:
          type: string
        updated_at:
          type: string
        steps:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowStepResponse"
      required:
        - id
        - name
        - status
        - organization_id
        - created_at
        - updated_at
        - steps
    WorkflowStepResponse:
      type: object
      properties:
        id:
          type: string
          description: Workflow step identifier (db format, e.g. id-verification).
        config:
          type: object
          additionalProperties: {}
          description: Step-specific configuration in snake_case.
      required:
        - id
        - config
